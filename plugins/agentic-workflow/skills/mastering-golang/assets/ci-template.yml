# GitHub Actions — copy to .github/workflows/ci.yml
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true
          cache: true            # caches the module + build caches

      - name: Verify formatting
        run: test -z "$(gofmt -l .)" || { echo "run gofmt"; gofmt -l .; exit 1; }

      - name: Vet
        run: go vet ./...

      - name: Lint (golangci-lint v2)
        run: go tool golangci-lint run ./...

      - name: Build
        run: go build ./...

      - name: Test (race + coverage)
        run: go test -race -coverprofile=cover.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cover.out
